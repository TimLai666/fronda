name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-rewrite-specs:
    name: Validate Fronda compatibility specs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Python toolchain
        run: python3 --version

      - name: Validate spec baseline
        run: python3 scripts/check_rust_rewrite_specs.py

  rust-tests:
    name: Build and test Fronda workspace
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ffmpeg dev libraries and libclang
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            clang libclang-dev pkg-config nasm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show Rust toolchain
        run: |
          cargo --version
          rustc --version

      - name: Check workspace formatting
        run: cargo fmt --all --check

      - name: Lint workspace
        run: cargo clippy --workspace --tests -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

  gpui-shell-check:
    name: Check Fronda gpui-ce app shell
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ffmpeg (thumbnail decoder)
        run: brew install ffmpeg pkg-config nasm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show Rust toolchain
        run: |
          cargo --version
          rustc --version

      - name: Check desktop shell
        run: cargo check -p fronda-app-shell-gpui --features desktop-app --bin fronda

  build-test:
    name: Build and test legacy Swift baseline
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select newest Xcode
        id: xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          echo "version=$(basename "$XCODE" .app)" >> "$GITHUB_OUTPUT"

      - name: Show Swift toolchain
        run: swift --version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ steps.xcode.outputs.version }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ steps.xcode.outputs.version }}-

      - name: Build
        run: swift build

      - name: Test
        run: swift test
