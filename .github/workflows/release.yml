name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.archive }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triplet: x64-linux
            archive: fronda-linux-x64.tar.gz
          - os: macos-latest
            triplet: arm64-osx
            archive: fronda-macos-arm64.tar.gz
          - os: windows-latest
            triplet: x64-windows-static-md
            archive: fronda-windows-x64.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-bincache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop + build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev pkg-config nasm cmake \
            libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev wayland-protocols \
            libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libvulkan-dev libgl1-mesa-dev \
            libfontconfig-dev libfreetype-dev \
            libasound2-dev libssl-dev libzstd-dev

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install nasm pkg-config

      - name: Install Windows build deps
        if: runner.os == 'Windows'
        run: choco install nasm -y

      - name: Prepare vcpkg binary cache dir
        shell: bash
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-${{ matrix.triplet }}-ffmpeg-8-v1

      - name: Build static ffmpeg (vcpkg)
        shell: bash
        run: |
          "$VCPKG_INSTALLATION_ROOT/vcpkg" install \
            "ffmpeg[core,avcodec,avformat,swscale,swresample]:${{ matrix.triplet }}"

      - name: Configure build environment
        shell: bash
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
          echo "VCPKGRS_TRIPLET=${{ matrix.triplet }}" >> "$GITHUB_ENV"
          PKGCFG="$VCPKG_INSTALLATION_ROOT/installed/${{ matrix.triplet }}/lib/pkgconfig"
          echo "PKG_CONFIG_PATH=$PKGCFG" >> "$GITHUB_ENV"
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "LIBCLANG_PATH=C:/Program Files/LLVM/bin" >> "$GITHUB_ENV"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "LIBCLANG_PATH=$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib" >> "$GITHUB_ENV"
          else
            echo "LIBCLANG_PATH=$(llvm-config --libdir 2>/dev/null || echo /usr/lib/llvm-18/lib)" >> "$GITHUB_ENV"
          fi

      - name: Build release binary
        run: cargo build --release -p fronda-app-shell-gpui --features desktop-app --bin fronda

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "dist/${{ matrix.archive }}" "./target/release/fronda.exe"
          else
            tar -czf "dist/${{ matrix.archive }}" -C target/release fronda
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive }}
